<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WATCH ME Screensaver</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #050505;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    body.shake {
      animation: shake 0.15s ease-in-out;
    }

    @keyframes shake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(5px, 0); }
      50% { transform: translate(-5px, 0); }
      75% { transform: translate(3px, 0); }
      100% { transform: translate(0, 0); }
    }

    #pathCanvas,
    #confettiCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #pathCanvas {
      z-index: 1;
    }

    #confettiCanvas {
      z-index: 50;
    }

    #controls {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 100;
      width: 300px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
    }

    #controls h2 {
      font-size: 18px;
      margin-bottom: 12px;
    }

    .control-group {
      margin-bottom: 14px;
    }

    label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    input,
    select,
    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 9px;
      font-size: 14px;
    }

    input[type="range"] {
      padding: 0;
    }

    button {
      cursor: pointer;
      background: white;
      color: black;
      font-weight: bold;
      margin-top: 6px;
    }

    button:hover {
      opacity: 0.85;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    #scoreboard {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 90;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      padding: 14px 18px;
      backdrop-filter: blur(12px);
      line-height: 1.7;
      min-width: 180px;
    }

    #cornerMessage {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      pointer-events: none;
      font-size: clamp(42px, 8vw, 110px);
      font-weight: 900;
      letter-spacing: 6px;
      opacity: 0;
      transform: scale(0.8);
      text-shadow: 0 0 30px currentColor;
    }

    #cornerMessage.show {
      animation: pop 0.8s ease-out;
    }

    @keyframes pop {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      20% {
        opacity: 1;
        transform: scale(1.08);
      }
      100% {
        opacity: 0;
        transform: scale(1.25);
      }
    }

    .bouncer {
      position: absolute;
      z-index: 10;
      padding: 18px 32px;
      font-size: 42px;
      font-weight: 900;
      color: white;
      background: #ff0055;
      border-radius: 12px;
      letter-spacing: 3px;
      user-select: none;
      white-space: nowrap;
      box-shadow: 0 0 25px #ff0055;
      will-change: transform;
    }

    .trail {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      padding: 18px 32px;
      font-size: 42px;
      font-weight: 900;
      color: white;
      border-radius: 12px;
      letter-spacing: 3px;
      white-space: nowrap;
      opacity: 0.28;
      transform: translate(-9999px, -9999px);
    }

    .hide-ui #controls,
    .hide-ui #scoreboard {
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 720px) {
      #controls {
        width: calc(100vw - 32px);
        max-height: 45vh;
      }

      #scoreboard {
        top: auto;
        right: 16px;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>

  <canvas id="pathCanvas"></canvas>
  <canvas id="confettiCanvas"></canvas>

  <div id="controls">
    <h2>WATCH ME Controls</h2>

    <div class="control-group">
      <label>
        Text
      </label>
      <input id="textInput" value="WATCH ME" />
    </div>

    <div class="control-group">
      <label>
        Speed
        <span id="speedValue">4</span>
      </label>
      <input id="speedSlider" type="range" min="1" max="20" value="4" />
    </div>

    <div class="control-group">
      <label>
        Text Size
        <span id="sizeValue">42</span>
      </label>
      <input id="sizeSlider" type="range" min="18" max="100" value="42" />
    </div>

    <div class="control-group">
      <label>
        Glow
        <span id="glowValue">25</span>
      </label>
      <input id="glowSlider" type="range" min="0" max="80" value="25" />
    </div>

    <div class="control-group">
      <label>
        Trail Length
        <span id="trailValue">8</span>
      </label>
      <input id="trailSlider" type="range" min="0" max="25" value="8" />
    </div>

    <div class="control-group">
      <label>Theme</label>
      <select id="themeSelect">
        <option value="classic">Classic DVD</option>
        <option value="cyberpunk">Cyberpunk Neon</option>
        <option value="matrix">Matrix Green</option>
        <option value="fire">Fire Mode</option>
        <option value="ice">Ice Mode</option>
        <option value="rainbow">Rainbow Chaos</option>
      </select>
    </div>

    <div class="control-group">
      <label>Mouse Mode</label>
      <select id="mouseMode">
        <option value="none">None</option>
        <option value="avoid">Avoid Cursor</option>
        <option value="chase">Chase Cursor</option>
        <option value="teleport">Click to Teleport</option>
      </select>
    </div>

    <div class="control-group">
      <div class="row">
        <button id="addCloneBtn">Add Clone</button>
        <button id="removeCloneBtn">Remove Clone</button>
      </div>
      <div class="row">
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
      </div>
      <div class="row">
        <button id="fullscreenBtn">Fullscreen</button>
        <button id="hideUiBtn">Hide UI</button>
      </div>
    </div>

    <div class="control-group">
      <div class="row">
        <button id="gravityBtn">Gravity: Off</button>
        <button id="soundBtn">Sound: Off</button>
      </div>
      <div class="row">
        <button id="pathBtn">Path: On</button>
        <button id="shakeBtn">Shake: On</button>
      </div>
    </div>
  </div>

  <div id="scoreboard">
    <div>Wall Hits: <strong id="wallHits">0</strong></div>
    <div>Corner Hits: <strong id="cornerHits">0</strong></div>
    <div>Bouncers: <strong id="cloneCount">1</strong></div>
  </div>

  <div id="cornerMessage">CORNER!</div>

  <script>
    const body = document.body;

    const pathCanvas = document.getElementById("pathCanvas");
    const pathCtx = pathCanvas.getContext("2d");

    const confettiCanvas = document.getElementById("confettiCanvas");
    const confettiCtx = confettiCanvas.getContext("2d");

    const textInput = document.getElementById("textInput");
    const speedSlider = document.getElementById("speedSlider");
    const sizeSlider = document.getElementById("sizeSlider");
    const glowSlider = document.getElementById("glowSlider");
    const trailSlider = document.getElementById("trailSlider");
    const themeSelect = document.getElementById("themeSelect");
    const mouseMode = document.getElementById("mouseMode");

    const speedValue = document.getElementById("speedValue");
    const sizeValue = document.getElementById("sizeValue");
    const glowValue = document.getElementById("glowValue");
    const trailValue = document.getElementById("trailValue");

    const wallHitsEl = document.getElementById("wallHits");
    const cornerHitsEl = document.getElementById("cornerHits");
    const cloneCountEl = document.getElementById("cloneCount");
    const cornerMessage = document.getElementById("cornerMessage");

    const addCloneBtn = document.getElementById("addCloneBtn");
    const removeCloneBtn = document.getElementById("removeCloneBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const hideUiBtn = document.getElementById("hideUiBtn");
    const gravityBtn = document.getElementById("gravityBtn");
    const soundBtn = document.getElementById("soundBtn");
    const pathBtn = document.getElementById("pathBtn");
    const shakeBtn = document.getElementById("shakeBtn");

    const themes = {
      classic: {
        background: "#050505",
        colors: ["#ff0055", "#00ccff", "#00ff88", "#ffaa00", "#aa00ff", "#ff3333"]
      },
      cyberpunk: {
        background: "radial-gradient(circle at center, #210034, #050008 70%)",
        colors: ["#ff00ff", "#00ffff", "#ffff00", "#ff0077", "#7700ff"]
      },
      matrix: {
        background: "#000900",
        colors: ["#00ff41", "#00cc33", "#99ff99", "#39ff14"]
      },
      fire: {
        background: "radial-gradient(circle at bottom, #4a1200, #050000 70%)",
        colors: ["#ff3300", "#ff6600", "#ffaa00", "#ff2200"]
      },
      ice: {
        background: "radial-gradient(circle at top, #103d5c, #02080d 70%)",
        colors: ["#66e0ff", "#b3f5ff", "#00aaff", "#d8fbff"]
      },
      rainbow: {
        background: "#030303",
        colors: ["#ff0040", "#ff9900", "#ffee00", "#00ff66", "#00ccff", "#cc00ff"]
      }
    };

    let bouncers = [];
    let wallHits = 0;
    let cornerHits = 0;
    let paused = false;
    let gravityMode = false;
    let soundOn = false;
    let pathOn = true;
    let shakeOn = true;
    let mouse = { x: 0, y: 0 };
    let confettiPieces = [];

    function resizeCanvas() {
      pathCanvas.width = window.innerWidth;
      pathCanvas.height = window.innerHeight;
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function getCurrentTheme() {
      return themes[themeSelect.value];
    }

    function randomColor() {
      const colors = getCurrentTheme().colors;
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function applyTheme() {
      body.style.background = getCurrentTheme().background;
      bouncers.forEach(b => setBouncerColor(b, randomColor()));
    }

    function setBouncerColor(bouncer, color) {
      bouncer.color = color;
      bouncer.el.style.background = color;
      bouncer.el.style.boxShadow = `0 0 ${glowSlider.value}px ${color}`;
      bouncer.trails.forEach(t => {
        t.style.background = color;
        t.style.boxShadow = `0 0 ${glowSlider.value}px ${color}`;
      });
    }

    function createBouncer(x = 100, y = 100) {
      const el = document.createElement("div");
      el.className = "bouncer";
      el.textContent = textInput.value || "WATCH ME";
      document.body.appendChild(el);

      const color = randomColor();

      const bouncer = {
        el,
        x,
        y,
        prevX: x,
        prevY: y,
        dx: Math.random() > 0.5 ? 1 : -1,
        dy: Math.random() > 0.5 ? 1 : -1,
        velocityY: 0,
        color,
        trails: []
      };

      setBouncerColor(bouncer, color);
      applyBouncerStyles(bouncer);
      bouncers.push(bouncer);
      updateCloneCount();
      rebuildTrails();

      return bouncer;
    }

    function applyBouncerStyles(bouncer) {
      const size = Number(sizeSlider.value);
      const glow = Number(glowSlider.value);

      bouncer.el.style.fontSize = `${size}px`;
      bouncer.el.style.boxShadow = `0 0 ${glow}px ${bouncer.color}`;

      bouncer.trails.forEach(trail => {
        trail.style.fontSize = `${size}px`;
        trail.style.padding = bouncer.el.style.padding;
        trail.style.borderRadius = bouncer.el.style.borderRadius;
      });
    }

    function rebuildTrails() {
      document.querySelectorAll(".trail").forEach(t => t.remove());

      const trailCount = Number(trailSlider.value);

      bouncers.forEach(bouncer => {
        bouncer.trails = [];

        for (let i = 0; i < trailCount; i++) {
          const trail = document.createElement("div");
          trail.className = "trail";
          trail.textContent = textInput.value || "WATCH ME";
          trail.style.background = bouncer.color;
          trail.style.boxShadow = `0 0 ${glowSlider.value}px ${bouncer.color}`;
          trail.style.opacity = String((trailCount - i) / trailCount * 0.25);
          document.body.appendChild(trail);
          bouncer.trails.push(trail);
        }

        applyBouncerStyles(bouncer);
      });
    }

    function updateCloneCount() {
      cloneCountEl.textContent = bouncers.length;
    }

    function updateScoreboard() {
      wallHitsEl.textContent = wallHits;
      cornerHitsEl.textContent = cornerHits;
    }

    function playBounceSound(isCorner = false) {
      if (!soundOn) return;

      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioCtx = new AudioContext();

      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.type = "sine";
      oscillator.frequency.value = isCorner ? 880 : 240;
      gain.gain.value = 0.08;

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.08);
    }

    function triggerShake() {
      if (!shakeOn) return;

      body.classList.remove("shake");
      void body.offsetWidth;
      body.classList.add("shake");
    }

    function celebrateCorner(x, y) {
      cornerHits++;
      updateScoreboard();

      cornerMessage.classList.remove("show");
      void cornerMessage.offsetWidth;
      cornerMessage.classList.add("show");

      launchConfetti(x, y);
      playBounceSound(true);
    }

    function launchConfetti(x, y) {
      for (let i = 0; i < 90; i++) {
        confettiPieces.push({
          x,
          y,
          size: Math.random() * 7 + 3,
          color: randomColor(),
          vx: (Math.random() - 0.5) * 10,
          vy: (Math.random() - 0.5) * 10,
          life: 80
        });
      }
    }

    function updateConfetti() {
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

      confettiPieces = confettiPieces.filter(piece => piece.life > 0);

      confettiPieces.forEach(piece => {
        piece.x += piece.vx;
        piece.y += piece.vy;
        piece.vy += 0.12;
        piece.life--;

        confettiCtx.globalAlpha = piece.life / 80;
        confettiCtx.fillStyle = piece.color;
        confettiCtx.fillRect(piece.x, piece.y, piece.size, piece.size);
      });

      confettiCtx.globalAlpha = 1;
    }

    function drawPath(bouncer) {
      if (!pathOn) return;

      pathCtx.strokeStyle = bouncer.color;
      pathCtx.globalAlpha = 0.25;
      pathCtx.lineWidth = 2;
      pathCtx.beginPath();
      pathCtx.moveTo(bouncer.prevX + bouncer.el.offsetWidth / 2, bouncer.prevY + bouncer.el.offsetHeight / 2);
      pathCtx.lineTo(bouncer.x + bouncer.el.offsetWidth / 2, bouncer.y + bouncer.el.offsetHeight / 2);
      pathCtx.stroke();
      pathCtx.globalAlpha = 1;
    }

    function updateTrails(bouncer) {
      for (let i = bouncer.trails.length - 1; i > 0; i--) {
        bouncer.trails[i].style.transform = bouncer.trails[i - 1].style.transform;
      }

      if (bouncer.trails.length > 0) {
        bouncer.trails[0].textContent = textInput.value || "WATCH ME";
        bouncer.trails[0].style.transform = `translate(${bouncer.x}px, ${bouncer.y}px)`;
      }
    }

    function handleMouseMode(bouncer) {
      const mode = mouseMode.value;
      if (mode === "none") return;

      const centerX = bouncer.x + bouncer.el.offsetWidth / 2;
      const centerY = bouncer.y + bouncer.el.offsetHeight / 2;

      const diffX = mouse.x - centerX;
      const diffY = mouse.y - centerY;
      const distance = Math.sqrt(diffX * diffX + diffY * diffY) || 1;

      if (mode === "avoid" && distance < 180) {
        bouncer.dx = -diffX / distance;
        bouncer.dy = -diffY / distance;
      }

      if (mode === "chase") {
        bouncer.dx = diffX / distance;
        bouncer.dy = diffY / distance;
      }
    }

    function moveBouncer(bouncer) {
      const speed = Number(speedSlider.value);
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      const textWidth = bouncer.el.offsetWidth;
      const textHeight = bouncer.el.offsetHeight;

      bouncer.prevX = bouncer.x;
      bouncer.prevY = bouncer.y;

      handleMouseMode(bouncer);

      let hitX = false;
      let hitY = false;

      if (gravityMode) {
        bouncer.x += bouncer.dx * speed;
        bouncer.velocityY += 0.35;
        bouncer.y += bouncer.velocityY;

        if (bouncer.y + textHeight >= screenHeight) {
          bouncer.y = screenHeight - textHeight;
          bouncer.velocityY *= -0.82;
          hitY = true;
        }

        if (bouncer.y <= 0) {
          bouncer.y = 0;
          bouncer.velocityY *= -0.82;
          hitY = true;
        }
      } else {
        bouncer.x += bouncer.dx * speed;
        bouncer.y += bouncer.dy * speed;
      }

      if (bouncer.x + textWidth >= screenWidth) {
        bouncer.x = screenWidth - textWidth;
        bouncer.dx *= -1;
        hitX = true;
      }

      if (bouncer.x <= 0) {
        bouncer.x = 0;
        bouncer.dx *= -1;
        hitX = true;
      }

      if (!gravityMode) {
        if (bouncer.y + textHeight >= screenHeight) {
          bouncer.y = screenHeight - textHeight;
          bouncer.dy *= -1;
          hitY = true;
        }

        if (bouncer.y <= 0) {
          bouncer.y = 0;
          bouncer.dy *= -1;
          hitY = true;
        }
      }

      if (hitX || hitY) {
        wallHits++;
        updateScoreboard();
        setBouncerColor(bouncer, randomColor());
        triggerShake();
        playBounceSound(false);
      }

      if (hitX && hitY) {
        celebrateCorner(bouncer.x + textWidth / 2, bouncer.y + textHeight / 2);
      }

      drawPath(bouncer);
      updateTrails(bouncer);

      bouncer.el.style.transform = `translate(${bouncer.x}px, ${bouncer.y}px)`;
    }

    function animate() {
      if (!paused) {
        bouncers.forEach(moveBouncer);
      }

      updateConfetti();
      requestAnimationFrame(animate);
    }

    function resetGame() {
      bouncers.forEach(b => b.el.remove());
      document.querySelectorAll(".trail").forEach(t => t.remove());

      bouncers = [];
      wallHits = 0;
      cornerHits = 0;
      updateScoreboard();

      pathCtx.clearRect(0, 0, pathCanvas.width, pathCanvas.height);
      confettiPieces = [];

      createBouncer(100, 100);
    }

    function clearPath() {
      pathCtx.clearRect(0, 0, pathCanvas.width, pathCanvas.height);
    }

    textInput.addEventListener("input", () => {
      const value = textInput.value || "WATCH ME";

      bouncers.forEach(b => {
        b.el.textContent = value;
        b.trails.forEach(t => {
          t.textContent = value;
        });
      });
    });

    speedSlider.addEventListener("input", () => {
      speedValue.textContent = speedSlider.value;
    });

    sizeSlider.addEventListener("input", () => {
      sizeValue.textContent = sizeSlider.value;
      bouncers.forEach(applyBouncerStyles);
      rebuildTrails();
    });

    glowSlider.addEventListener("input", () => {
      glowValue.textContent = glowSlider.value;
      bouncers.forEach(b => setBouncerColor(b, b.color));
    });

    trailSlider.addEventListener("input", () => {
      trailValue.textContent = trailSlider.value;
      rebuildTrails();
    });

    themeSelect.addEventListener("change", () => {
      applyTheme();
      clearPath();
    });

    addCloneBtn.addEventListener("click", () => {
      createBouncer(
        Math.random() * (window.innerWidth - 260),
        Math.random() * (window.innerHeight - 120)
      );
    });

    removeCloneBtn.addEventListener("click", () => {
      if (bouncers.length <= 1) return;

      const bouncer = bouncers.pop();
      bouncer.el.remove();
      bouncer.trails.forEach(t => t.remove());
      updateCloneCount();
    });

    pauseBtn.addEventListener("click", () => {
      paused = !paused;
      pauseBtn.textContent = paused ? "Resume" : "Pause";
    });

    resetBtn.addEventListener("click", resetGame);

    fullscreenBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    hideUiBtn.addEventListener("click", () => {
      body.classList.toggle("hide-ui");
      hideUiBtn.textContent = body.classList.contains("hide-ui") ? "Show UI" : "Hide UI";
    });

    gravityBtn.addEventListener("click", () => {
      gravityMode = !gravityMode;
      gravityBtn.textContent = gravityMode ? "Gravity: On" : "Gravity: Off";
    });

    soundBtn.addEventListener("click", () => {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "Sound: On" : "Sound: Off";
    });

    pathBtn.addEventListener("click", () => {
      pathOn = !pathOn;
      pathBtn.textContent = pathOn ? "Path: On" : "Path: Off";

      if (!pathOn) {
        clearPath();
      }
    });

    shakeBtn.addEventListener("click", () => {
      shakeOn = !shakeOn;
      shakeBtn.textContent = shakeOn ? "Shake: On" : "Shake: Off";
    });

    window.addEventListener("mousemove", event => {
      mouse.x = event.clientX;
      mouse.y = event.clientY;
    });

    window.addEventListener("click", event => {
      if (mouseMode.value !== "teleport") return;
      if (event.target.closest("#controls")) return;

      const main = bouncers[0];
      main.x = event.clientX;
      main.y = event.clientY;
    });

    window.addEventListener("keydown", event => {
      if (event.key.toLowerCase() === "h") {
        body.classList.toggle("hide-ui");
      }

      if (event.key === " ") {
        paused = !paused;
        pauseBtn.textContent = paused ? "Resume" : "Pause";
      }

      if (event.key.toLowerCase() === "r") {
        resetGame();
      }
    });

    speedValue.textContent = speedSlider.value;
    sizeValue.textContent = sizeSlider.value;
    glowValue.textContent = glowSlider.value;
    trailValue.textContent = trailSlider.value;

    applyTheme();
    createBouncer(100, 100);
    animate();
  </script>

</body>
</html>
