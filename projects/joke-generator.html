<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joke Generator - Timepass Hub</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <main class="site project-page">
    <div class="topbar">
      <a class="brand" href="../index.html">
        <div class="logo">🎮</div>
        <div>Timepass Hub</div>
      </a>
      <a class="nav-pill" href="../index.html">← Home</a>
    </div>

    <section class="game-panel">
      
<div class="game-header">
  <h1>😂 Joke Generator</h1>
  <a class="back-btn" href="../index.html">← Back Home</a>
</div>
<div id="output" class="result-box">Click the button for a joke.</div>
<button id="generate" class="primary-btn">Generate Joke</button>

    </section>
  </main>

  <script src="../js/main.js"></script>
  <script>

const jokes = [
  "Why did the computer go to therapy? It had too many tabs open.",
  "I told my code a joke, but it did not react. It had no event listener.",
  "Why do programmers prefer dark mode? Because light attracts bugs.",
  "My Wi-Fi and I are in a long-distance relationship.",
  "I asked JavaScript for commitment. It said: undefined."
];

document.getElementById("generate").addEventListener("click", () => {
  setText("output", pick(jokes));
});

  </script>
</body>
</html>
