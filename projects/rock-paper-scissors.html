<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors - Timepass Hub</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <main class="site project-page">
    <div class="topbar">
      <a class="brand" href="../index.html">
        <div class="logo">🎮</div>
        <div>Timepass Hub</div>
      </a>
      <a class="nav-pill" href="../index.html">← Home</a>
    </div>

    <section class="game-panel">
      
<div class="game-header">
  <h1>✊ Rock Paper Scissors</h1>
  <a class="back-btn" href="../index.html">← Back Home</a>
</div>

<div class="scoreboard">
  <div class="score"><strong id="userScore">0</strong><span>You</span></div>
  <div class="score"><strong id="drawScore">0</strong><span>Draws</span></div>
  <div class="score"><strong id="computerScore">0</strong><span>Computer</span></div>
</div>

<div id="output" class="result-box">Choose your move.</div>

<div class="row">
  <button class="choice-btn choice" data-choice="rock">✊ Rock</button>
  <button class="choice-btn choice" data-choice="paper">✋ Paper</button>
  <button class="choice-btn choice" data-choice="scissors">✌️ Scissors</button>
</div>

    </section>
  </main>

  <script src="../js/main.js"></script>
  <script>

let userScore = 0;
let computerScore = 0;
let drawScore = 0;

function updateScores() {
  setText("userScore", userScore);
  setText("computerScore", computerScore);
  setText("drawScore", drawScore);
}

document.querySelectorAll(".choice").forEach(button => {
  button.addEventListener("click", () => {
    const choices = ["rock", "paper", "scissors"];
    const userChoice = button.dataset.choice;
    const computerChoice = pick(choices);

    let result;

    if (userChoice === computerChoice) {
      drawScore++;
      result = "It's a draw.";
    } else if (
      (userChoice === "rock" && computerChoice === "scissors") ||
      (userChoice === "paper" && computerChoice === "rock") ||
      (userChoice === "scissors" && computerChoice === "paper")
    ) {
      userScore++;
      result = "You win!";
    } else {
      computerScore++;
      result = "Computer wins!";
    }

    updateScores();
    setText("output", `You chose ${userChoice}. Computer chose ${computerChoice}. ${result}`);
  });
});

  </script>
</body>
</html>
