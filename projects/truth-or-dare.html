<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth or Dare - Timepass Hub</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <main class="site project-page">
    <div class="topbar">
      <a class="brand" href="../index.html">
        <div class="logo">🎮</div>
        <div>Timepass Hub</div>
      </a>
      <a class="nav-pill" href="../index.html">← Home</a>
    </div>

    <section class="game-panel">
      
<div class="game-header">
  <h1>🎲 Truth or Dare</h1>
  <a class="back-btn" href="../index.html">← Back Home</a>
</div>
<div id="output" class="result-box">Choose Truth or Dare.</div>
<div class="row">
  <button id="truth" class="choice-btn">Truth</button>
  <button id="dare" class="choice-btn">Dare</button>
</div>

    </section>
  </main>

  <script src="../js/main.js"></script>
  <script>

const truths = [
  "What is one thing you searched online that you would not want others to see?",
  "What is the funniest thing you believed as a child?",
  "What is one habit you know you should stop?",
  "Who was your first crush?",
  "What is the most embarrassing thing you have done recently?"
];

const dares = [
  "Speak in a movie villain voice for 30 seconds.",
  "Do your best celebrity impression.",
  "Send a funny emoji to the last person you texted.",
  "Dance for 10 seconds without music.",
  "Say the alphabet backwards as far as you can."
];

document.getElementById("truth").addEventListener("click", () => setText("output", pick(truths)));
document.getElementById("dare").addEventListener("click", () => setText("output", pick(dares)));

  </script>
</body>
</html>
