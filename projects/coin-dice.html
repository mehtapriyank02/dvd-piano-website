<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin & Dice - Timepass Hub</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <main class="site project-page">
    <div class="topbar">
      <a class="brand" href="../index.html">
        <div class="logo">🎮</div>
        <div>Timepass Hub</div>
      </a>
      <a class="nav-pill" href="../index.html">← Home</a>
    </div>

    <section class="game-panel">
      
<div class="game-header">
  <h1>🪙 Coin & Dice</h1>
  <a class="back-btn" href="../index.html">← Back Home</a>
</div>
<div id="output" class="result-box">Flip or roll.</div>
<div class="row">
  <button id="coin" class="choice-btn">Flip Coin</button>
  <button id="dice" class="choice-btn">Roll Dice</button>
</div>

    </section>
  </main>

  <script src="../js/main.js"></script>
  <script>

document.getElementById("coin").addEventListener("click", () => {
  setText("output", `Coin result: ${Math.random() < 0.5 ? "Heads" : "Tails"}`);
});

document.getElementById("dice").addEventListener("click", () => {
  setText("output", `Dice result: ${Math.floor(Math.random() * 6) + 1}`);
});

  </script>
</body>
</html>
